<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example Page</title>
    <style>
        html,
        body {
            font-size: 19px;
        }

        div {
            transition: all 160ms ease;
        }

        button {
            min-width: 4em;
        }
    </style>
</head>

<body>
    <h1>Example Page</h1>
    <div class="" style="width: 290px;">
        <div id="approot"></div>
        <!-- <div id="extra"></div> -->
    </div>



    <script type="module">
        import Ntred from './selfdep/index.js';
        import morphdom from 'https://unpkg.com/morphdom@2.7.8/dist/morphdom-esm.js';





        window.Ntred = Ntred;

        let mainapp = Ntred.create((useEffect, app) => {
            const [count, setCount] = app.useState(0);
            app.useEvent('up', () => {
                setCount(c => c + 1);
            });
            app.useEvent('down', () => {
                setCount(c => c - 1);
            });
            let mydom = `<div>
                <div>Count = ${count}</div>
                <div>
                    <button data-click="down">-</button>
                    <button data-click="up">+</button>
                </div>
                <div style="display: flex;">
                    <div style="opacity: ${1 - (count % 2)};">Even</div>
                    <div style="flex-grow: 1;"></div>
                    <div style="opacity: ${count % 2};">Odd</div>
                </div>
            </div>`;
            return () => { 
                morphdom(app._root, mydom.trim(), { childrenOnly: true }); // childrenOnly not working. Only first div (count = xx) is rendered.
            };
        });
        mainapp.mount(document.querySelector('#approot'));
        mainapp.run();
    </script>
</body>

</html>
