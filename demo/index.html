<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example Page</title>
    <style>
        html, body {
            font-size: 19px;
        }
        [data-polarity] {
            transition: all 160ms ease;
        }
        button {
            min-width: 4em;
        }
    </style>
</head>

<body>
    <h1>Example Page</h1>
    <div class="" style="width: 290px;">
        <div id="approot">
        </div>
        <div id="extra">
        </div>
    </div>



    <script type="module">
        import Ntred from './selfdep/index.js';
        window.Ntred = Ntred;

        let mainapp = Ntred.create((useEffect, app) => {
            const [count, setCount] = app.useState(0);
            app.useEvent('up', () => {
                setCount(c => c + 1);
            });
            app.useEvent('down', () => {
                setCount(c => c - 1);
            });
            useEffect(() => {
                document.querySelector('#extra').innerHTML = `<div style="display: flex;">
                    <div data-polarity="even">Even</div>
                    <div style="flex-grow: 1;"></div>
                    <div data-polarity="odd">Odd</div>
                </div>`;
            }, []);
            useEffect(() => {
                console.log('count changed:', count);
                const is_even = count % 2 === 0;
                document.querySelector('#extra  [data-polarity="even"]').style.opacity = is_even ? '1' : '0';
                document.querySelector('#extra  [data-polarity="odd"]').style.opacity = !is_even ? '1' : '0';
            }, [count]);
            return `<div>Count = ${count}</div>
        <button data-click="down">-</button>
        <button data-click="up">+</button>
    `;
        });
        mainapp.mount(document.querySelector('#approot'));
        mainapp.run(1000 / 120);
    </script>
</body>

</html>
